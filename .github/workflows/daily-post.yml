name: Daily Baseball Post
# TJStats Bot — posts baseball analytics content to X

on:
  schedule:
    # 10 AM EST (UTC-5) = 15:00 UTC — screenshot post
    - cron: '0 15 * * *'
    # 2 PM EST (UTC-5) = 19:00 UTC — text post
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      slot:
        description: 'Content slot to run'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - screenshot
          - text
      generator:
        description: 'Override: run a specific generator by name (leave empty for schedule)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - pitcher_spotlight
          - stat_of_day
          - hardest_pitch
          - guess_pitcher
          - explainer
          - arsenal_vs
          - movement_profile
          - ss_pitching_summary
          - ss_statcast_cards
          - ss_pitch_plots
          - ss_leaderboard
          - ss_heat_maps

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Determine slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ inputs.slot }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H)" -lt 17 ]; then
            echo "slot=screenshot" >> $GITHUB_OUTPUT
          else
            echo "slot=text" >> $GITHUB_OUTPUT
          fi

      - name: Run bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          PITCH_PROFILER_API_KEY: ${{ secrets.PITCH_PROFILER_API_KEY }}
        run: |
          ARGS="--slot ${{ steps.slot.outputs.slot }}"
          if [ -n "${{ inputs.generator }}" ]; then
            ARGS="--generator ${{ inputs.generator }}"
          fi
          python -m src.main $ARGS

      - name: Commit post history
        continue-on-error: true
        run: |
          git config user.name "tjstats-bot"
          git config user.email "bot@tjstats.local"
          git add data/post_history.json
          git diff --cached --quiet || git commit -m "Update post history [skip ci]"
          git push || echo "Warning: git push failed (transient error), skipping"
