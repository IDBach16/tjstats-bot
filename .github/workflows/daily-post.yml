name: Daily Baseball Post
# TJStats Bot — posts baseball analytics content to X

on:
  schedule:
    # 10 AM EST (UTC-5) = 15:00 UTC — screenshot post
    - cron: '0 15 * * *'
    # 2 PM EST (UTC-5) = 19:00 UTC — text post
    - cron: '0 19 * * *'
    # 5 PM EST (UTC-5) = 22:00 UTC — pitching summary
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      slot:
        description: 'Content slot to run'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - screenshot
          - text
      generator:
        description: 'Override: run a specific generator by name (leave empty for schedule)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - pitcher_spotlight
          - stat_of_day
          - hardest_pitch
          - guess_pitcher
          - explainer
          - arsenal_vs
          - movement_profile
          - pitching_summary
          - pitcher_card
          - ss_pitching_summary
          - ss_statcast_cards
          - ss_pitch_plots
          - ss_leaderboard
          - ss_heat_maps

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Determine slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ inputs.slot }}" >> $GITHUB_OUTPUT
            echo "generator=${{ inputs.generator }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" -ge 21 ]; then
              # 5 PM EST (22:00 UTC) — pitching summary
              echo "slot=screenshot" >> $GITHUB_OUTPUT
              echo "generator=pitching_summary" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -lt 17 ]; then
              # 10 AM EST (15:00 UTC) — scheduled screenshot
              echo "slot=screenshot" >> $GITHUB_OUTPUT
              echo "generator=" >> $GITHUB_OUTPUT
            else
              # 2 PM EST (19:00 UTC) — scheduled text
              echo "slot=text" >> $GITHUB_OUTPUT
              echo "generator=" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          PITCH_PROFILER_API_KEY: ${{ secrets.PITCH_PROFILER_API_KEY }}
        run: |
          if [ -n "${{ steps.slot.outputs.generator }}" ]; then
            ARGS="--generator ${{ steps.slot.outputs.generator }}"
          else
            ARGS="--slot ${{ steps.slot.outputs.slot }}"
          fi
          python -m src.main $ARGS

      - name: Commit post history
        continue-on-error: true
        run: |
          git config user.name "tjstats-bot"
          git config user.email "bot@tjstats.local"
          git add data/post_history.json
          git diff --cached --quiet || git commit -m "Update post history [skip ci]"
          git push || echo "Warning: git push failed (transient error), skipping"
